name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint -- --quiet

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            builder_args: --win --x64
            artifact: windows-x64
          - name: Windows arm64
            os: windows-latest
            builder_args: --win --arm64
            artifact: windows-arm64
          - name: Linux x64
            os: ubuntu-latest
            builder_args: --linux --x64
            artifact: linux-x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            builder_args: --linux --arm64
            artifact: linux-arm64
          - name: macOS x64
            os: macos-15-intel
            builder_args: --mac --x64
            artifact: macos-x64
          - name: macOS arm64
            os: macos-14
            builder_args: --mac --arm64
            artifact: macos-arm64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ ((startsWith(matrix.os, 'macos') && secrets.CSC_LINK != '') || (startsWith(matrix.os, 'windows') && secrets.WIN_CSC_LINK != '')) && 'true' || 'false' }}
      CSC_LINK: ${{ startsWith(matrix.os, 'macos') && secrets.CSC_LINK || '' }}
      WIN_CSC_LINK: ${{ startsWith(matrix.os, 'windows') && secrets.WIN_CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main bundles
        run: npm run build

      - name: Prepare Apple API key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [[ -z "${APPLE_API_KEY_BASE64}${APPLE_API_KEY_CONTENT}" ]]; then
            exit 0
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID:-apple}.p8"
          APPLE_API_KEY_FILE="$key_path" node <<'NODE'
          const fs = require('node:fs')

          let key = process.env.APPLE_API_KEY_BASE64
            ? Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64').toString('utf8')
            : (process.env.APPLE_API_KEY_CONTENT ?? '').replace(/\\n/g, '\n')

          if (!key.endsWith('\n')) key += '\n'
          fs.writeFileSync(process.env.APPLE_API_KEY_FILE, key, { mode: 0o600 })
          NODE
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Package ${{ matrix.name }}
        run: npx electron-builder ${{ matrix.builder_args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lux-antidetect-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate updater metadata
        shell: bash
        run: node scripts/generate-release-update-metadata.mjs release-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          declare -A seen
          upload_files=()
          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            if [[ -n "${seen[$base]:-}" ]]; then
              echo "Duplicate release asset basename: $base"
              echo "First path: ${seen[$base]}"
              echo "Second path: $file"
              exit 1
            fi
            seen[$base]="$file"
            upload_files+=("$file")
          done < <(find release-artifacts -type f -print0 | sort -z)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${upload_files[@]}" --clobber
            gh release edit "$TAG_NAME" --latest --draft=false --prerelease=false
          else
            gh release create "$TAG_NAME" "${upload_files[@]}" \
              --title "Lux Antidetect $TAG_NAME" \
              --generate-notes \
              --latest
          fi
